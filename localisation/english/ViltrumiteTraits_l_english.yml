l_english:
####################################
# Traits
####################################

trait_viltrumite_flight: "Psychokinetic Flight"
trait_viltrumite_flight_desc: "This species is capable of translating themselves through space by creating their own leverage. As a result, interplanetary travel is trivial for them. Due to their ability to levitate above the battlefield, they can easily avoid ground emplacements and quickly close the gap between themselves and their targets."

trait_viltrumite_durability: "Extreme Durability"
trait_viltrumite_durability_desc: "This species is uncannily resilient, immune to most firearms up to even high-grade anti-tank weaponry. As a result, they are also easily able to withstand harsh climates."

trait_viltrumite_strength: "Incredible Strength"
trait_viltrumite_strength_desc: "This species is capable of exerting more force than a being its size should be able to. Members of this species are commonly able to lift entire hab-units single-handed."

trait_viltrumite_regen: "Bodily Regeneration"
trait_viltrumite_regen_desc: "Members of this species are able to regenerate from all but the most grievous of wounds, and even become stronger thereafter. Because of their capacity for regeneration, these beings are extremely hard to kill."

trait_viltrumite: "Viltrumite"
trait_viltrumite_desc: "Members of this species are effectively immortal. They age slower as they grow older, while their strength continues to increase. An old Viltrumite is one that has fought and conquered for centuries, if not millennia."

viltrumite_soldier: "Viltrumite Soldier"
viltrumite_soldier_cap: "Viltrumite Soldier"
viltrumite_soldier_key: "Viltrumite"
viltrumite_soldier_plural: "Viltrumite Soldiers"

viltrumite_leader: "Experienced Viltrumite"
viltrumite_leader_cap: "Experienced Viltrumite"
viltrumite_leader_key: "Experienced Viltrumite"
viltrumite_leader_plural: "Experienced Viltrumites"

viltrumite_hero: "Blooded Viltrumite"
viltrumite_hero_cap: "Blooded Viltrumite"
viltrumite_hero_key: "Blooded Viltrumite"
viltrumite_hero_plural: "Blooded Viltrumites"

viltrumite_emperor: "Viltrumite Emperor"
viltrumite_emperor_cap: "Viltrumite Emperor"
viltrumite_emperor_key: "Viltrumite Emperor"
viltrumite_emperor_plural: "How???"

VILTRUMITE_FIST_WEAPON_1: "Viltrumite Fists"
VILTRUMITE_FIST_WEAPON_1_DESC: "A Viltrumite's fists are often their preferred weapon. Strong enough to dent a ship's hull just by clenching their fist, a Viltrumite can quickly break holes into an enemy ship if not dispatched quickly."

VILTRUMITE_CUT_WEAPON_1: "Viltrumite Slice"
VILTRUMITE_CUT_WEAPON_1_DESC: "Due to their durability, a Viltrumite's hands are far more sturdy than those of other species. With a flat hand, a Viltrumite can stab or slash through metal and flesh. However, they struggle to make it through thick armor."

VILTRUMITE_PD_WEAPON_1: "Viltrumite Self Defense"
VILTRUMITE_PD_WEAPON_1_DESC: "Although Viltrumites are nigh-impervious to small arms fire, they are not immune. Missiles, guns, and explosions can whittle away at their defenses, eventually leaving them vulnerable. However, the extreme lethality and agility of a Viltrumite allows them to dispatch nimble targets before they can deal too much damage."

VILTRUMITE_HULL_1: "Viltrumite Flesh"
VILTRUMITE_HULL_1_DESC: "Viltrumite flesh is extremely tough, and near-impervious to most weaponry."

VILTRUMITE_HEART_1: "Viltrumite Heart"
VILTRUMITE_HEART_1_DESC: "The source of a Viltrumite's regeneration."

VILTRUMITE_FTL_1: "Interstellar Flight"
VILTRUMITE_FTL_1_DESC: "Although it is not as easily sustained as other methods of travel, a Viltrumite's ability to fly can be used to travel in between systems, irregardless of the presence or lack of hyperlanes."

VILTRUMITE_FLIGHT_1: "Psychokinetic Flight"
VILTRUMITE_FLIGHT_1_DESC: "Viltrumites fly by creating their own leverage, physically translating themselves through space. This can be used even in a vacuum, allowing for flight through interplanetary and intersolar space."

VILTRUMITE_SENSOR_1: "Viltrumite Combat Experience"
VILTRUMITE_SENSOR_1_DESC: "The martial nature of Viltrumites means that they are constantly subjected to combat from a very young age. As a result, their reflexes and intuition are more honed than those of other species."

VILTRUMITE_ROLE_1: "Viltrumite Behavior"
VILTRUMITE_ROLE_1_DESC: "Each Viltrumite is a warrior of their own, but those in a group learn to adapt to each other's strengths, improving cohesion."

VILTRUMITE_FLY_WEAPON_M: "Living Projectile"
VILTRUMITE_FLY_WEAPON_L: "Living Projectile"
VILTRUMITE_FLY_WEAPON_1_DESC: "Although not all are capable of such feats of strength, sufficiently powerful Viltrumites are capable of making themselves a weapon as they fly through the hull of enemy ships, leaving gaping holes in armor plating and ship hulls. However, if the ship's shields are still engaged, the Viltrumite would instead rebound off harmlessly."